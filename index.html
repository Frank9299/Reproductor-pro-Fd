    <style>

        body {

            color: #ffffff;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;

        /* Scrollbars y Utilidades */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }
        
        .hide-scroll::-webkit-scrollbar { display: none !important; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animaciones Globales */
        .view-section {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .view-section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Animación IA Core */

        @keyframes ai-glow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); background-color: rgba(220, 38, 38, 0.8); }

        }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; background: transparent; height: 10px; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--primary-color); cursor: pointer; margin-top: -4px; box-shadow: 0 0 8px var(--primary-color); transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }

        .vertical-slider { -webkit-appearance: none; writing-mode: vertical-lr; direction: rtl; width: 10px; height: 120px; }
    </style>

    <!-- ==================== LÓGICA DE INGENIERÍA (JAVASCRIPT) ==================== -->
    <script type="module">
        // ---------------------------------------------------------
        // MÓDULO 1: FIREBASE CORE & SYNC (Preservado y Ampliado)
        // ---------------------------------------------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCROZ20n9v4WesAHLg-Ngk-wAsWg3IquaE",
            authDomain: "reproductor-de-musica-d9baf.firebaseapp.com",
            databaseURL: "https://reproductor-de-musica-d9baf-default-rtdb.firebaseio.com",
            projectId: "reproductor-de-musica-d9baf"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);

        // Estado Global Consolidado
        window.OS_STATE = {
            role: 'controlled', // 'controller' o 'controlled'
            activeEngine: 'local', // 'local' o 'youtube'
            localPlaying: false,
            ytPlaying: false,
            isAiGlobalEnabled: true,
            themeColor: '#ec4899'
        };

        // Emitir comandos a Firebase
        window.sendFirebaseCommand = function(type, value, engine = 'local') {
            set(ref(window.db, 'reproductor_control/command'), {
                type: type, value: value, engine: engine, timestamp: Date.now()
            });
        };

        // Emitir Status (Solo si somos el 'controlled'/Player)
        window.reportStatusToFirebase = function() {
            if(window.OS_STATE.role !== 'controlled') return;
            const statusObj = {
                activeEngine: window.OS_STATE.activeEngine,
                localTrackName: window.todasLasPistas && window.indicePistaActual > -1 ? window.todasLasPistas[window.indicePistaActual].nombre : "Ninguna",
                localProgress: document.getElementById('progress-bar').value || 0,
                localPlaying: window.OS_STATE.localPlaying,
                ytVideoId: window.currentYtVideoId || null,
                ytTitle: document.getElementById('ytVideoTitle').innerText || "",
                timestamp: Date.now()
            };
            set(ref(window.db, 'reproductor_control/status'), statusObj);
        };

        // Escuchar Comandos (Ejecutar si somos Player)
        let lastCommandTimestamp = 0;
        onValue(ref(window.db, 'reproductor_control/command'), (snapshot) => {
            const cmd = snapshot.val();
            if(cmd && cmd.timestamp > lastCommandTimestamp) {
                lastCommandTimestamp = cmd.timestamp;
                if(window.OS_STATE.role === 'controlled') {
                    if(cmd.engine === 'local') {
                        if(cmd.type === 'PLAY') window.executeLocalPlay();
                        else if(cmd.type === 'PAUSE') window.executeLocalPause();
                        else if(cmd.type === 'NEXT') window.executeLocalNext();
                        else if(cmd.type === 'PREV') window.executeLocalPrev();
                        else if(cmd.type === 'PLAY_TRACK') window.playLocalTrack(cmd.value);
                    } else if (cmd.engine === 'youtube') {
                        if(cmd.type === 'PLAY_YT') window.loadYTVideo(cmd.value.id, cmd.value.title, cmd.value.channel);
                    }
                    else if (cmd.engine === 'system') {
                        if(cmd.type === 'SWITCH_VIEW') window.switchAppView(cmd.value, true);
                    }
                }
            }
        });

        // Escuchar Status (UI Update si somos Controller)
        onValue(ref(window.db, 'reproductor_control/status'), (snapshot) => {
            const status = snapshot.val();
            if(status && window.OS_STATE.role === 'controller') {
                // Sincronizar Vista activa remotamente si cambió
                if(status.activeEngine !== window.OS_STATE.activeEngine) {
                    window.switchAppView(status.activeEngine, true);
                }
                
                if(status.activeEngine === 'local') {
                    document.getElementById('full-title').textContent = status.localTrackName;
                    if(!window.isDraggingProgress) document.getElementById('progress-bar').value = status.localProgress;
                    window.OS_STATE.localPlaying = status.localPlaying;
                    document.getElementById('full-play-icon').className = status.localPlaying ? "fas fa-pause text-xl" : "fas fa-play text-xl ml-1";
                } else if (status.activeEngine === 'youtube') {
                    document.getElementById('ytVideoTitle').innerText = status.ytTitle;
                    if(status.ytVideoId && status.ytVideoId !== window.currentYtVideoId) {
                        window.loadYTVideo(status.ytVideoId, status.ytTitle, "Modo Remoto", true);
                    }
                }
            }
        });

        // ---------------------------------------------------------
        // MÓDULO 2: UI ROUTER & CORE LOGIC
        // ---------------------------------------------------------
        
        window.switchAppView = function(viewId, fromRemote = false) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('text-[var(--primary-color)]'));
            
            const target = document.getElementById(`view-${viewId}`);
            const navBtn = document.getElementById(`nav-${viewId}`);
            
            if(target) target.classList.add('active');
            if(navBtn) navBtn.classList.add('text-[var(--primary-color)]');
            
            window.OS_STATE.activeEngine = viewId;

            // Lógica de Pausa Cruzada: Si pasas a YT, pausa Local, y viceversa
            if(viewId === 'youtube' && window.OS_STATE.localPlaying) window.executeLocalPause();
            // Nota: La API iFrame de YT pausa es compleja sin librería wrapper, usaremos recarga del iframe si es necesario o detener al cambiar a local.
            if(viewId === 'local') {
                const ytFrame = document.getElementById('mainVideoPlayer');
                if(ytFrame.src.includes('autoplay=1')) ytFrame.src = ytFrame.src.replace('autoplay=1', 'autoplay=0'); 
            }

            // Avisar a Firebase si somos controlador manual
            if(!fromRemote && window.OS_STATE.role === 'controller') {
                window.sendFirebaseCommand('SWITCH_VIEW', viewId, 'system');
            }
            window.reportStatusToFirebase();
        };

        window.switchRole = function(role) {
            window.OS_STATE.role = role;
            const pBtn = document.getElementById('role-player-btn');
            const cBtn = document.getElementById('role-controller-btn');
            
            if(role === 'controller') {
                pBtn.className = "px-3 py-1 rounded-full transition-all text-gray-400 hover:text-white";
                cBtn.className = "px-3 py-1 rounded-full transition-all bg-[var(--primary-color)] text-white shadow-md";
                if(window.OS_STATE.localPlaying) window.executeLocalPause(); // Apaga reproducción local al volverse control
            } else {
                pBtn.className = "px-3 py-1 rounded-full transition-all bg-[var(--primary-color)] text-white shadow-md";

    <!-- --------------------------------------------------------- -->
    <script>
        window.activateVoiceAssistant = function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("API de reconocimiento de voz no soportada en este navegador/WebView.");
                return;
            }

            const rec = new SpeechRecognition();
            rec.lang = 'es-ES';
            rec.interimResults = false;

            const btn = document.getElementById('global-ai-btn');
            const banner = document.getElementById('aiBanner');
            const bannerText = document.getElementById('aiBannerText');

            btn.classList.add('ai-pulse-active');
            banner.classList.remove('hidden');
            bannerText.textContent = "Analizando comando...";

            rec.start();

            rec.onresult = function(e) {
                const phrase = e.results[0][0].transcript.toLowerCase().trim();
                bannerText.textContent = "Procesando: " + phrase;
                setTimeout(() => window.executeAiRouter(phrase), 500);
            };

            rec.onerror = rec.onend = function() {
                btn.classList.remove('ai-pulse-active');
                setTimeout(() => banner.classList.add('hidden'), 1500);
            };
        };

        window.executeAiRouter = function(cmd) {
            console.log("Comando IA:", cmd);
            let handled = false;

            // 1. HARDWARE (Android Interface)
            const num = cmd.match(/\d+/);
            const level = num ? parseInt(num[0]) : null;

            if(cmd.includes("volumen") || cmd.includes("sonido")) {
                let target = level !== null ? level : (cmd.includes("sube") ? 80 : 20);
                if(window.AndroidInterface && window.AndroidInterface.changePhoneVolume) {
                    window.AndroidInterface.changePhoneVolume(target);
                }
                handled = true;
            }
            if(cmd.includes("brillo") || cmd.includes("luz")) {
                let target = level !== null ? level : (cmd.includes("sube") ? 90 : 20);
                if(window.AndroidInterface && window.AndroidInterface.changePhoneBrightness) {
                    window.AndroidInterface.changePhoneBrightness(target);
                }
                handled = true;
            }

            // 2. SISTEMA / MODOS
            if(cmd.includes("modo control") || cmd.includes("control remoto")) {
                window.switchRole('controller');
                handled = true;
            }

            // 3. MEDIA CONTROLS
            if(cmd.includes("pausa") || cmd.includes("deten")) {
                if(window.OS_STATE.activeEngine === 'local') window.executeLocalPause();
                handled = true;
            }
            if(cmd.includes("siguiente") || cmd.includes("otra")) {
                if(window.OS_STATE.activeEngine === 'local') window.executeLocalNext();
                handled = true;
            }

            // 4. BÚSQUEDA Y REPRODUCCIÓN INTELIGENTE
            if(!handled) {
                let search = cmd.replace("busca", "").replace("pon", "").replace("reproduce", "").replace("en youtube", "").trim();
                if(cmd.includes("youtube") || cmd.includes("video")) {
                    window.switchAppView('youtube');
                    document.getElementById('ytSearchInput').value = search;
                    window.triggerYTSearch(search);
                } else {
                    // Default a YouTube si no hay música local
                    if(window.todasLasPistas && window.todasLasPistas.length > 0) {
                        window.switchAppView('local');
                        // Filtrar y tocar la primera coincidencia (Simplificado)
                        const found = window.todasLasPistas.findIndex(p => p.nombre.toLowerCase().includes(search));
                        if(found !== -1) window.playLocalTrack(found);
                    } else {
                        window.switchAppView('youtube');
                        document.getElementById('ytSearchInput').value = search;
                        window.triggerYTSearch(search);
                    }
                }
            }
            document.getElementById('aiBannerText').textContent = "Ejecutado.";
        };
    </script>

    <script>

    <!-- --------------------------------------------------------- -->
    <script>
        window.todasLasPistas = [];
        window.indicePistaActual = -1;
        const mainAudio = document.getElementById('main-audio');
        const supportedExts = ['.mp3', '.wav', '.m4a', '.ogg', '.flac'];

        // Solicitud FS nativa
        window.solicitarAccAccessCarpeta = async function() {
            if (window.OS_STATE.role === 'controller') return;
            if (!window.showDirectoryPicker) {
                document.getElementById('fallback-folder-picker').click(); return;
            }
            try {
                const handle = await window.showDirectoryPicker({ mode: 'read' });
                window.todasLasPistas = [];
                await procesarDirRec(handle, "");
                renderLocalList();
            } catch(e) { console.log(e); document.getElementById('fallback-folder-picker').click(); }
        };

        window.procesarCarpetaFallback = function(files) {
            window.todasLasPistas = [];
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const ext = file.name.slice(file.name.lastIndexOf('.')).toLowerCase();
                if (supportedExts.includes(ext)) window.todasLasPistas.push({ nombre: file.name, fileObject: file });
            }
            renderLocalList();
        };

        async function procesarDirRec(handle, path) {
            for await (const entry of handle.values()) {
                if (entry.kind === 'directory') await procesarDirRec(entry, path + entry.name + "/");
                else if (entry.kind === 'file') {
                    const ext = entry.name.slice(entry.name.lastIndexOf('.')).toLowerCase();
                    if(supportedExts.includes(ext)) window.todasLasPistas.push({ nombre: entry.name, manejador: entry });
                }
            }
        }

        function renderLocalList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            if(window.todasLasPistas.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-500 mt-4 text-xs">Carpeta vacía</div>'; return;
            }
            window.todasLasPistas.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = "p-2 rounded bg-white/5 border border-white/5 hover:bg-white/10 cursor-pointer flex items-center gap-2 group transition-all";
                div.innerHTML = `<i class="fas fa-play text-[8px] text-gray-500 group-hover:text-[var(--primary-color)]"></i> <span class="text-xs truncate text-gray-200">${p.nombre.replace(/\.[^/.]+$/, "")}</span>`;
                div.onclick = () => {
                    if(window.OS_STATE.role === 'controller') window.sendFirebaseCommand('PLAY_TRACK', idx, 'local');
                    else window.playLocalTrack(idx);
                };
                list.appendChild(div);
            });
        }

        window.playLocalTrack = async function(idx) {
            if (idx < 0 || idx >= window.todasLasPistas.length) return;
            window.indicePistaActual = idx;
            const pista = window.todasLasPistas[idx];

            try {
                let file;
                if (pista.fileObject) file = pista.fileObject;
                else {
                    if ((await pista.manejador.queryPermission({mode: 'read'})) !== 'granted') await pista.manejador.requestPermission({mode: 'read'});
                    file = await pista.manejador.getFile();
                }

                mainAudio.src = URL.createObjectURL(file);
                document.getElementById('full-title').innerText = pista.nombre.replace(/\.[^/.]+$/, "");
                
                setupAudioEngine(); // Activa visualizador
                window.executeLocalPlay();
            } catch(e) { console.error("Error reproduciendo local", e); }
        };

        // Controles de Playback Locales
        window.togglePlayLocal = function() {
            if(window.OS_STATE.role === 'controller') {
                window.sendFirebaseCommand(window.OS_STATE.localPlaying ? 'PAUSE' : 'PLAY', null, 'local');
            } else {
                window.OS_STATE.localPlaying ? window.executeLocalPause() : window.executeLocalPlay();
            }
        };

        window.executeLocalPlay = function() {
            if(window.todasLasPistas.length === 0) return;
            if(window.indicePistaActual === -1) window.playLocalTrack(0);
            else { mainAudio.play(); window.OS_STATE.localPlaying = true; updateLocalUI(); }
        };

        window.executeLocalPause = function() { mainAudio.pause(); window.OS_STATE.localPlaying = false; updateLocalUI(); };
        window.executeLocalNext = function() { window.playLocalTrack((window.indicePistaActual + 1) % window.todasLasPistas.length); };
        window.executeLocalPrev = function() { window.playLocalTrack((window.indicePistaActual - 1 + window.todasLasPistas.length) % window.todasLasPistas.length); };
        
        window.seekTrackLocal = function(val) { if(mainAudio.duration) mainAudio.currentTime = (val/100)*mainAudio.duration; };
        window.setVolumeLocal = function(val) { mainAudio.volume = val; };

        function updateLocalUI() {
            document.getElementById('full-play-icon').className = window.OS_STATE.localPlaying ? "fas fa-pause text-xl" : "fas fa-play text-xl ml-1";
            window.reportStatusToFirebase();
        }

        // Time Update
        mainAudio.addEventListener('timeupdate', () => {
            if(mainAudio.duration) {
                const c = mainAudio.currentTime, d = mainAudio.duration;
                document.getElementById('progress-bar').value = (c/d)*100;
                document.getElementById('time-current').innerText = `${Math.floor(c/60)}:${Math.floor(c%60).toString().padStart(2,'0')}`;
                document.getElementById('time-total').innerText = `${Math.floor(d/60)}:${Math.floor(d%60).toString().padStart(2,'0')}`;
            }
        });
        mainAudio.addEventListener('ended', () => window.executeLocalNext());

        // ---------------------------------------------------------
        // AUDIO CONTEXT & CANVAS VISUALIZER (Básico presencial)
        // ---------------------------------------------------------
        let audioCtx = null, analyser = null, dataArray = null;
        let vMode = 'bars';
        
        window.setVisualizerMode = function(m) { vMode = m; };

        function setupAudioEngine() {
            if(audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaElementSource(mainAudio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            drawVisualizer();
        }

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            if(!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            const cvs = document.getElementById('visualizer-canvas');
            const ctx = cvs.getContext('2d');
            
            // Auto resize
            if(cvs.width !== cvs.offsetWidth) cvs.width = cvs.offsetWidth;
            if(cvs.height !== cvs.offsetHeight) cvs.height = cvs.offsetHeight;

            ctx.clearRect(0,0, cvs.width, cvs.height);
            const color = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim();
            ctx.fillStyle = color;

            const count = analyser.frequencyBinCount;
            if (vMode === 'bars') {
                const bw = (cvs.width / count) * 1.5;
                let x = 0;
                for(let i=0; i<count; i++) {
                    const h = (dataArray[i]/255) * cvs.height;
                    ctx.fillRect(x, cvs.height - h, bw - 1, h);
                    x += bw;
                }
            } else if (vMode === 'wave') {
                ctx.beginPath(); ctx.lineWidth=3; ctx.strokeStyle=color;
                const sw = cvs.width / count; let x=0;
                for(let i=0; i<count; i++) {
                    const y = (dataArray[i]/255)*cvs.height*0.5 + cvs.height/4;
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    x+=sw;
                }
                ctx.stroke();
            } else if (vMode === 'matrix' || vMode === 'circle') {
                // Implementación comprimida para evitar sobrecarga: Círculo simple
                const cX = cvs.width/2, cY = cvs.height/2;
                ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2;
                for(let i=0; i<count; i++) {
                    const ang = (i/count)*Math.PI*2;
                    const h = (dataArray[i]/255) * (cvs.height/3);
                    ctx.moveTo(cX + Math.cos(ang)*50, cY + Math.sin(ang)*50);
                    ctx.lineTo(cX + Math.cos(ang)*(50+h), cY + Math.sin(ang)*(50+h));
                }
                ctx.stroke();
            }
        }

        // INIT
        window.addEventListener('DOMContentLoaded', () => {
            window.switchAppView('local');
        });
    </script>
